<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple</title>
</head>
<body>
<div style="border:1px solid black; background: salmon; height: 10em; width:10em;" class="drop-zone"></div>
<div style="border:1px solid black; background: salmon; height: 10em; width:10em;" class="drop-zone"></div>
<div style="border:1px solid black; background: salmon; height: 10em; width:10em;" class="drop-zone"></div>
<p>

  <button draggable="true" id="drag-item">Drag me!</button>
</p>

  <script type="module">
const dragItem = document.querySelector("#drag-item")
const dropZones = Array.from(document.querySelectorAll(".drop-zone"))

dragItem.addEventListener("dragstart", e => 
  e.dataTransfer.setData("text/plain", e.target.id) 
)

dropZone.addEventListener("dragenter", e =>  {
  console.log(e.type)
  e.preventDefault()
})

dragItem.addEventListener("drag", e =>  {
  console.log(e.type)
})

dropZone.addEventListener("dragover", e =>  {
  console.log(e.type)
  e.preventDefault()
})

dropZone.addEventListener("drop", e =>  {
  console.log(e.type)
  e.preventDefault()
  const data = e.dataTransfer.getData("text/plain")
  e.target.appendChild(document.getElementById(data))
})

  </script>
</body>
</html>
