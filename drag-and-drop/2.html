<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Document</title>
</head>
<body>
  
<img src="https://placekitten.com/225/188" width="225px" height="188px">
  
<textarea placeholder="drag kitten here"></textarea>
 
<script type="module">


let div = document.querySelector('div')
let img = document.querySelector('img')

div.addEventListener('dragover', e => e.preventDefault())

div.addEventListener('drop', e => div.append(img))

</script>

</body>
</html>
