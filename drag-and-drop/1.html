<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" href="tutorial.css">
  <title>Document</title>
</head>
<body>

<main>
  <img src="images/random-kitten.jpg" width="225px" height="188px">
  
  💥
  🗯️
  <textarea placeholder="drag kitten here"></textarea>
</main>

<aside id="event-log"><h2>Event log</h2></aside>

<script type="module">
let eventLog = document.querySelector('aside')

let logEvent = event => {
  eventLog.innerHTML += `<p>${performance.now()} ${event.type} event fired on ${event.target.tagName}</p>`

  eventLog.scrollIntoView({ behavior: "smooth" })
  eventLog.scrollTop = eventLog.scrollHeight
}

addEventListener('dragstart', logEvent)
addEventListener('drag', logEvent)
addEventListener('dragend', logEvent)
</script>

</body>
</html>
